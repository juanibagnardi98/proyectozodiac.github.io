<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <style>
        /* Fondo centrado y tarjeta de login centrada en la pantalla */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            background-image: url('./posibleuso3.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.92);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
            max-width: 420px;
            width: 92%;
            text-align: center;
        }

        h1 { margin-top: 0; margin-bottom: 12px; text-align: center; color: #111; }

        form div { margin-bottom: 14px; }

        label { display:block; margin-bottom:6px; font-weight:700; color:#222; text-align:left; }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.12);
            box-sizing: border-box;
            font-size: 14px;
        }

        button[type="submit"] {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: #ffd700;
            color: #111;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width:420px) {
            .login-card { padding: 18px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Inicio de Sesión</h1>
        <div id="login-message" role="status" aria-live="polite" style="min-height:1.2em;margin-bottom:10px;color:#b00020;display:none;text-align:center;font-weight:700;"></div>
        <form action="#" method="post">
            <div>
                <label for="USUARIO">Correo electrónico</label>
                <input type="email" id="USUARIO" name="USUARIO" placeholder="tu@correo.com" required>
            </div>
            <div>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Iniciar sesión</button>
        </form>
    </div>
    <script>
        // Validar credenciales contra localStorage rotz_users (solo por correo)
        (function() {
            var form = document.querySelector('.login-card form');
            var messageEl = document.getElementById('login-message');
            function showMessage(text, ok) {
                messageEl.style.display = text ? 'block' : 'none';
                messageEl.style.color = ok ? '#0a7a3a' : '#b00020';
                messageEl.textContent = text || '';
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                showMessage('');
                var email = document.getElementById('USUARIO').value.trim().toLowerCase();
                var password = document.getElementById('password').value;
                if (!email || email.indexOf('@') === -1) {
                    showMessage('Introduce un correo válido.', false);
                    return;
                }
                var users = JSON.parse(localStorage.getItem('rotz_users') || '{}');
                var stored = users[email];
                if (stored && stored.password === password) {
                    localStorage.setItem('rotz_current', email);
                    showMessage('Inicio de sesión correcto. Redirigiendo...', true);
                    // pequeña espera para que el usuario vea el mensaje
                    setTimeout(function() { window.location.href = 'raceofthezodiac.html'; }, 400);
                } else {
                    showMessage('Correo o contraseña incorrectos.', false);
                }
            });
        })();
    </script>
</body>
</html>
