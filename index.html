            'mujer_piscis': { role: 'asesina', image: './asesina.png' }
        };

        var yearSelect = document.getElementById('birth-year');
        var animalAssignment = document.getElementById('animal-assignment');
        var genderSelect = document.getElementById('gender');
        var zodiacSelect = document.getElementById('zodiac');
        var roleContainer = document.getElementById('role-container');
        var roleAssignment = document.getElementById('role-assignment');
        var roleImage = document.getElementById('role-image');
        var elementDisplay = document.getElementById('element-display');
        var elementImage = document.getElementById('element-image');
        var emailInput = document.getElementById('email');
        var usernameInput = document.getElementById('username');
        var passwordInput = document.getElementById('password');
        var showPasswordCheckbox = document.getElementById('show-password');
        var genderInput = genderSelect;
        var form = document.querySelector('form');

        function updateAnimal() {
            var year = yearSelect.value;
            if (animalMap[year]) {
                animalAssignment.textContent = 'Animal asignado: ' + animalMap[year];
            } else if (year) {
                animalAssignment.textContent = 'Animal asignado: Ninguno predeterminado';
            } else {
                animalAssignment.textContent = 'Selecciona tu año para ver tu animal.';
            }
            updateRole();
        }

        function updateRole() {
            var gender = genderSelect.value;
            var zodiac = zodiacSelect.value;
            var key = gender + '_' + zodiac;

            if (gender && zodiac && roleMap[key]) {
                roleAssignment.textContent = roleMap[key].role.toUpperCase();
                roleImage.src = roleMap[key].image;
                
                // Mostrar elemento según el signo zodiacal
                if (zodiac === 'aries' || zodiac === 'leo' || zodiac === 'sagitario') {
                    elementDisplay.textContent = 'Elemento: Fuego';
                    elementImage.src = './fuego.png';
                    elementImage.style.display = 'block';
                } else if (zodiac === 'geminis' || zodiac === 'libra' || zodiac === 'acuario') {
                    elementDisplay.textContent = 'Elemento: Aire';
                    elementImage.src = './aire.png';
                    elementImage.style.display = 'block';
                } else if (zodiac === 'tauro' || zodiac === 'virgo' || zodiac === 'capricornio') {
                    elementDisplay.textContent = 'Elemento: Tierra';
                    elementImage.src = './tierra.png';
                    elementImage.style.display = 'block';
                } else if (zodiac === 'cancer' || zodiac === 'escorpio' || zodiac === 'piscis') {
                    elementDisplay.textContent = 'Elemento: Agua';
                    elementImage.src = './agua.png';
                    elementImage.style.display = 'block';
                } else {
                    elementDisplay.textContent = '';
                    elementImage.src = '';
                    elementImage.style.display = 'none';
                }
                
                roleContainer.style.display = 'block';
            } else {
                roleContainer.style.display = 'none';
            }
        }

        yearSelect.addEventListener('change', updateAnimal);
        genderSelect.addEventListener('change', updateRole);
        zodiacSelect.addEventListener('change', updateRole);
        showPasswordCheckbox.addEventListener('change', function() {
            passwordInput.type = this.checked ? 'text' : 'password';
        });

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            var email = emailInput.value.trim();
            if (!email) {
                alert('Ingresa un correo electrónico válido para recibir la información.');
                return;
            }

            var username = usernameInput.value.trim();
            var password = passwordInput.value.trim();
            var gender = genderSelect.value;
            var zodiac = zodiacSelect.value;
            var year = yearSelect.value;
            var animal = animalMap[year] || 'N/A';
            var role = roleAssignment.textContent || 'N/A';
            var element = elementDisplay.textContent || 'N/A';

            var subject = encodeURIComponent('Registro Race of the Zodiac');
            var body = encodeURIComponent(
                'Correo: ' + email + '\n' +
                'Usuario: ' + username + '\n' +
                'Contraseña: ' + password + '\n' +
                'Género: ' + gender + '\n' +
                'Año de nacimiento: ' + year + '\n' +
                'Animal asignado: ' + animal + '\n' +
                'Signo zodiacal: ' + zodiac + '\n' +
                'Rol: ' + role + '\n' +
                'Elemento: ' + element
            );

            window.location.href = 'mailto:' + email + '?subject=' + subject + '&body=' + body;
            
            setTimeout(function() {
                window.location.href = 'raceofthezodiac.html';
            }, 1500);
        });
